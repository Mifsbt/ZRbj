            if (name) {
              const job = getJobClass(name);
              return `<div class="lc-slot filled" data-slot="${i}" data-card="${card.id}" title="${name} (左键换位，右键移除)" draggable="true">
                <img class="slot-char-bg" src="${isSSR(name) ? 'SSR.png' : 'SR.png'}" onerror="this.style.display='none'">
                <img class="slot-char-img" src="${getSpriteFile(name)}" onerror="this.src='${SLOT_FALLBACK}'" draggable="false">
                <img class="slot-char-badge" src="S6.png" onerror="this.style.display='none'">
                <img class="slot-char-job" src="common_Job_${job}.png" onerror="this.style.display='none'">
              </div>`;
            }
            return `<div class="lc-slot" data-slot="${i}" data-card="${card.id}" title="空位"><div class="slot-empty-icon">+</div></div>`;
          }).join('')}
        <div class="lc-skill-order">
          <div class="lc-so-header">
            <span class="lc-so-title">奥义顺序</span>
          </div>
          <div class="lc-so-row" data-card="${card.id}">
            ${renderSkillOrderHTML(card)}
          </div>
        </div>
      </div>
    </div>
  `;

  // ===== Event delegation for the card =====
  el.querySelectorAll('[data-action]').forEach(elem => {
    const action = elem.dataset.action;
    if (action === 'move') {
      // Card dragging via handle
      let cardDragStartX, cardDragStartY, cardDragStartCardX, cardDragStartCardY;
      elem.addEventListener('mousedown', function(e) {
        e.stopPropagation();
        cardDragStartX = e.clientX;
        cardDragStartY = e.clientY;
        cardDragStartCardX = card.x;
        cardDragStartCardY = card.y;
        const onMove = (e) => {
          card.x = cardDragStartCardX + (e.clientX - cardDragStartX) / canvasScale;
          card.y = cardDragStartCardY + (e.clientY - cardDragStartY) / canvasScale;
          el.style.left = Math.round(card.x) + 'px';
          el.style.top = Math.round(card.y) + 'px';
          requestRedraw();
        };
        const onUp = () => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
          saveAll();
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      });
    } else if (action === 'title') {
      elem.addEventListener('change', function() {
        card.title = this.value;
        saveAll();
      });
      elem.addEventListener('mousedown', e => e.stopPropagation());
    } else if (action === 'dragon') {
      elem.addEventListener('change', function() {
        card.dragonName = this.value;
        renderLineupCard(card);
        saveAll();
      });
      elem.addEventListener('mousedown', e => e.stopPropagation());
    } else if (action === 'delete') {
      elem.addEventListener('click', function(e) {
        e.stopPropagation();
        deleteLineupCard(card.id);
      });
    } else if (action === 'duplicate') {
      elem.addEventListener('click', function(e) {
        e.stopPropagation();
        const newCard = createLineupCard(card.x + 40, card.y + 40, {
          title: card.title + ' (副本)',
          dragonName: card.dragonName,
        });
        newCard.lineup = [...card.lineup];
        newCard.longyu = [...card.longyu];
        newCard.skillOrder = [...card.skillOrder];
        newCard.skillOrderToggles = { ...card.skillOrderToggles };
        renderLineupCard(newCard);
        saveAll();
        setStatus('已复制阵容');
      });
    } else if (action === 'longyu') {
      elem.addEventListener('click', function(e) {
        e.stopPropagation();
        openLongyuModal(card.id, parseInt(this.dataset.slot));
      });
    }
  });

  // Slot interactions
  el.querySelectorAll('.lc-slot').forEach(slot => {
    const slotIdx = parseInt(slot.dataset.slot);
    const cardId = parseInt(slot.dataset.card);
    const name = card.lineup[slotIdx];

    // Drag from slot to slot (same or different card)
    slot.addEventListener('dragstart', function(e) {
      if (!name) { e.preventDefault(); return; }
      e.stopPropagation();
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', JSON.stringify({ from: 'slot', name, cardId, slotIdx }));
    });
    slot.addEventListener('dragend', function(e) {
      e.stopPropagation();
      this.classList.remove('dragging');
      document.querySelectorAll('.lc-slot').forEach(s => s.classList.remove('drag-over', 'forbidden'));
    });

    // Drop on slot
    slot.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.stopPropagation();
      e.dataTransfer.dropEffect = 'move';
      this.classList.add('drag-over');
    });
    slot.addEventListener('dragleave', function(e) {
      this.classList.remove('drag-over');
      this.classList.remove('forbidden');
    });
    slot.addEventListener('drop', function(e) {
      e.preventDefault();
      e.stopPropagation();
      this.classList.remove('drag-over');
      this.classList.remove('forbidden');
      document.querySelectorAll('.lc-slot').forEach(s => s.classList.remove('drag-over', 'forbidden'));

      let dropName, fromCardId, fromSlotIdx;
      try {
        const raw = e.dataTransfer.getData('text/plain');
        const parsed = JSON.parse(raw);
        dropName = parsed.name;
        fromCardId = parsed.cardId;
        fromSlotIdx = parsed.slotIdx;
      } catch(ex) {
        // Fallback: plain text from pool
        dropName = e.dataTransfer.getData('text/plain');
        fromCardId = null;
        fromSlotIdx = null;
      }
      if (!dropName) return;

      const targetCard = lineupCards.find(c => c.id === cardId);
      if (!targetCard) return;

      if (fromCardId != null && fromSlotIdx != null) {
        // Move from another slot
        const sourceCard = lineupCards.find(c => c.id === fromCardId);
        if (!sourceCard) return;
        const existing = targetCard.lineup[slotIdx];
        if (!existing) {
          // Target is empty slot
          if (fromCardId !== cardId && targetCard.lineup.filter(Boolean).length >= 6) {
            setStatus('目标阵容已满（最多6人）'); return;
          }
          if (!canPlaceInSlot(dropName, slotIdx)) {
            setStatus(JOB_NAMES[getJobClass(dropName)] + '不能放在' + getSlotRestriction(slotIdx % 3));
            return;
          }
        } else {
          // Target has existing char (swap)
          if (!canPlaceInSlot(dropName, slotIdx)) {
            setStatus(JOB_NAMES[getJobClass(dropName)] + '不能放在' + getSlotRestriction(slotIdx % 3));
            return;
          }
          if (!canPlaceInSlot(existing, fromSlotIdx)) {
            setStatus(JOB_NAMES[getJobClass(existing)] + '不能放在' + getSlotRestriction(fromSlotIdx % 3));
            return;
          }
        }
        if (fromCardId === cardId) {
          // Same card swap
          sourceCard.lineup[fromSlotIdx] = existing;
          targetCard.lineup[slotIdx] = dropName;
        } else {
          // Cross-card move
          sourceCard.lineup[fromSlotIdx] = existing;
          targetCard.lineup[slotIdx] = dropName;
        }
        renderLineupCard(sourceCard);
      } else {
        // From pool
        if (isCharInCard(dropName, targetCard)) { setStatus('该角色已在此阵容中'); return; }
        if (targetCard.lineup.filter(Boolean).length >= 6) { setStatus('阵容已满（最多6人）'); return; }
        if (!canPlaceInSlot(dropName, slotIdx)) {
          setStatus(JOB_NAMES[getJobClass(dropName)] + '不能放在' + getSlotRestriction(slotIdx % 3));
          return;
        }
        targetCard.lineup[slotIdx] = dropName;
      }

      updateSkillOrderForCard(targetCard);
      renderLineupCard(targetCard);
      applyPoolFilter();
      setStatus('已上阵 ' + dropName);
      saveAll();
    });

    // Click on slot
    slot.addEventListener('click', function(e) {
      e.stopPropagation();
      const targetCard = lineupCards.find(c => c.id === cardId);
      if (!targetCard) return;
      const current = targetCard.lineup[slotIdx];

      if (current) {
        // Remove if no selectedChar, otherwise replace
        if (selectedChar) {
          if (selectedChar !== current && isCharInCard(selectedChar, targetCard)) { setStatus('该角色已在此阵容中'); return; }
          if (!canPlaceInSlot(selectedChar, slotIdx)) {
            setStatus(JOB_NAMES[getJobClass(selectedChar)] + '不能放在' + getSlotRestriction(slotIdx % 3));
            return;
          }
          targetCard.lineup[slotIdx] = selectedChar;
          document.querySelectorAll('.char-card').forEach(el => el.classList.remove('selected'));
          selectedChar = null;
          updateSkillOrderForCard(targetCard);
          renderLineupCard(targetCard);
          applyPoolFilter();
          setStatus('已替换为 ' + targetCard.lineup[slotIdx]);
        } else {
          targetCard.lineup[slotIdx] = null;
          updateSkillOrderForCard(targetCard);
          renderLineupCard(targetCard);
          applyPoolFilter();
          setStatus('已移除 ' + current);
        }
      } else if (selectedChar) {
        if (isCharInCard(selectedChar, targetCard)) { setStatus('该角色已在此阵容中'); return; }
        if (targetCard.lineup.filter(Boolean).length >= 6) { setStatus('阵容已满（最多6人）'); return; }
        if (!canPlaceInSlot(selectedChar, slotIdx)) {
          setStatus(JOB_NAMES[getJobClass(selectedChar)] + '不能放在' + getSlotRestriction(slotIdx % 3));
          return;
        }
        targetCard.lineup[slotIdx] = selectedChar;
        document.querySelectorAll('.char-card').forEach(el => el.classList.remove('selected'));
        selectedChar = null;
        updateSkillOrderForCard(targetCard);
        renderLineupCard(targetCard);
        applyPoolFilter();
        setStatus('已上阵 ' + targetCard.lineup[slotIdx]);
      }
      saveAll();
    });

    // Right click to remove
    slot.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      e.stopPropagation();
      if (name) {
        targetCard.lineup[slotIdx] = null;
        updateSkillOrderForCard(targetCard);
        renderLineupCard(targetCard);
        applyPoolFilter();
        setStatus('已移除 ' + name);
        saveAll();
      }
    });
  });

  // Skill order drag
  el.querySelectorAll('.lc-so-item').forEach(item => {
    const skillIdx = parseInt(item.dataset.skillIdx);
    item.addEventListener('dragstart', function(e) {
      e.stopPropagation();
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/skillorder', JSON.stringify({ cardId: card.id, fromIdx: skillIdx }));
    });
    item.addEventListener('dragend', function(e) {
      e.stopPropagation();
      this.classList.remove('dragging');
      document.querySelectorAll('.lc-so-item').forEach(el => el.classList.remove('drag-over'));
    });
    item.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.stopPropagation();
      this.classList.add('drag-over');
    });
    item.addEventListener('drop', function(e) {
      e.preventDefault();
      e.stopPropagation();
      this.classList.remove('drag-over');
      try {
        const data = JSON.parse(e.dataTransfer.getData('text/skillorder'));
        if (data.cardId === card.id) {
          const from = data.fromIdx;
          const to = parseInt(this.dataset.skillIdx);
          if (from !== to) {
            const arr = card.skillOrder;
            const moved = arr.splice(from, 1)[0];
            arr.splice(to > from ? to - 1 : to, 0, moved);
            renderLineupCard(card);
            saveAll();
          }
        }
      } catch(ex) {}
    });
  });

  // Skill toggle
  el.querySelectorAll('.so-individual-toggle input').forEach(input => {
    const charName = input.dataset.charName;
    input.addEventListener('change', function() {
      card.skillOrderToggles[charName] = this.checked;
      saveAll();
    });
    input.addEventListener('mousedown', e => e.stopPropagation());
  });
  bindSoPorts(el);
  requestRedraw();
}

function renderSkillOrderHTML(card) {
  if (card.skillOrder.length === 0) {
    return '<div class="lc-so-row empty" style="min-height:48px;display:flex;align-items:center;color:var(--text3);font-size:11px;">阵容为空</div>';
  }
  return card.skillOrder.map((name, i) => {
    const job = getJobClass(name);
    const checked = card.skillOrderToggles[name] !== false ? 'checked' : '';
    return `
      <div class="lc-so-item" draggable="true" data-skill-idx="${i}">
        <div class="so-icon-wrapper">
          <img class="so-bg" src="${isSSR(name) ? 'SSR.png' : 'SR.png'}" onerror="this.style.display='none'">
          <img class="so-avatar" src="${getSpriteFile(name)}" onerror="this.style.display='none'">
          <img class="so-badge" src="S6.png" onerror="this.style.display='none'">
          <img class="so-job" src="common_Job_${job}.png" onerror="this.style.display='none'">
          <div class="so-idx">${i + 1}</div>
        </div>
        <label class="so-individual-toggle">
          <input type="checkbox" ${checked} data-char-name="${escHtml(name)}">
          <span class="so-toggle-slider"></span>
        </label>
        <div class="so-port" data-so-port data-card-id="${card.id}" data-char-name="${escHtml(name)}" title="装备连接口（拖拽装备到此连接）"></div>
      </div>
    `;
  }).join('');
}

function updateSkillOrderForCard(card) {
  const onField = card.lineup.filter(Boolean);
  card.skillOrder = card.skillOrder.filter(name => onField.includes(name));
  onField.forEach(name => {
    if (!card.skillOrder.includes(name)) card.skillOrder.push(name);
    if (card.skillOrderToggles[name] === undefined) card.skillOrderToggles[name] = true;
  });
  // Drop connections to characters no longer on the field
  cleanupConnections();
}

function clampLineup(lineup, max) { let count = lineup.filter(Boolean).length; if (count > max) { for (let i = lineup.length - 1; i >= 0 && count > max; i--) { if (lineup[i]) { lineup[i] = null; count--; } } } }
function isCharInCard(name, card) {
  return card.lineup.includes(name);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== Pool =====
function applyPoolFilter() {
  document.querySelectorAll('.char-card').forEach(card => {
    if (card.classList.contains('pool-upload-cell')) { card.style.display = ''; return; }
    const name = card.dataset.name;
    const job = JOB_NAMES[getJobClass(name)] || '';
    const factions = getCharFactions(name);
    const jobMatch = poolJobFilter === '全部' || job === poolJobFilter;
    const factionMatch = poolFactionFilter === '全部' || factions.includes(poolFactionFilter);
    card.style.display = (jobMatch && factionMatch) ? '' : 'none';
  });
}

function initFilters() {
  const jobEl = $('poolJobFilters');
  ['全部', ...Object.values(JOB_NAMES)].forEach(j => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (j === poolJobFilter ? ' active' : '');
    btn.textContent = j;
    btn.addEventListener('click', function() {
      poolJobFilter = j;
      document.querySelectorAll('#poolJobFilters .filter-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      applyPoolFilter();
    });
    jobEl.appendChild(btn);
  });

  const facEl = $('poolFactionFilters');
  ['全部', ...FACTIONS].forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (f === poolFactionFilter ? ' active' : '');
    btn.textContent = f;
    btn.addEventListener('click', function() {
      poolFactionFilter = f;
      document.querySelectorAll('#poolFactionFilters .filter-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      applyPoolFilter();
    });
    facEl.appendChild(btn);
  });
}

function initPool() {
  CHAR_NAMES.forEach(name => {
    const card = document.createElement('div');
    card.className = 'char-card';
    card.dataset.name = name;
    card.title = name;

    const imgLayers = [
      { cls:'char-bg', src: isSSR(name) ? 'SSR.png' : 'SR.png' },
      { cls:'char-avatar', src: getSpriteFile(name) },
      { cls:'char-badge', src: 'S6.png' },
      { cls:'char-job', src: 'common_Job_' + getJobClass(name) + '.png' },
    ];
    imgLayers.forEach(({ cls, src }) => {
      const img = document.createElement('img');
      img.className = cls;
      img.src = src;
      img.onerror = function() { this.style.display = 'none'; };
      card.appendChild(img);
    });

    card.draggable = true;
    card.addEventListener('dragstart', function(e) {
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', JSON.stringify({ from: 'pool', name }));
    });
    card.addEventListener('dragend', function(e) {
      this.classList.remove('dragging');
      document.querySelectorAll('.lc-slot').forEach(s => s.classList.remove('drag-over', 'forbidden'));
    });

    card.addEventListener('click', function() {
      if (selectedChar === name) {
        this.classList.remove('selected');
        selectedChar = null;
        setStatus('已取消选择');
      } else {
        document.querySelectorAll('.char-card').forEach(el => el.classList.remove('selected'));
        this.classList.add('selected');
        selectedChar = name;
        setStatus('已选择：' + name + '，点击阵容空位上阵');
      }
    });

    card.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      for (const c of lineupCards) {
        if (c.lineup.filter(Boolean).length >= 6) continue;
        if (isCharInCard(name, c)) continue;
        for (let i = 0; i < 9; i++) {
          if (!c.lineup[i] && canPlaceInSlot(name, i)) {
            c.lineup[i] = name;
            updateSkillOrderForCard(c);
            renderLineupCard(c);
            selectedChar = null;
            document.querySelectorAll('.char-card').forEach(el => el.classList.remove('selected'));
            applyPoolFilter();
            setStatus('右键上阵：' + name + ' → ' + c.title, true);
            saveAll();
            return;
          }
        }
      }
      setStatus('没有可放置的空位');
    });

    poolGrid.appendChild(card);
  });

  // Custom uploaded characters (restored from localStorage)
  CUSTOM_CHARS.forEach(entry => appendCustomCharToPool(entry));

  // Upload cell at the bottom of the pool
  const uploadCell = document.createElement('div');
  uploadCell.className = 'char-card pool-upload-cell';
  uploadCell.title = '上传自定义角色（文件名前两位为阵容：1元素 2旷野 3奥术 4圣堂 5彼岸 6幻境）';
  uploadCell.innerHTML = '<div class="pool-upload-inner"><span class="pool-upload-icon">＋</span><span class="pool-upload-label">上传角色</span></div>';
  uploadCell.addEventListener('click', function() { uploadCustomChar(); });
  poolGrid.appendChild(uploadCell);

  applyPoolFilter();
  charCount.textContent = (CHAR_NAMES.length + CUSTOM_CHARS.length) + ' 个角色';
}

// ===== Connections (equipment group → character) =====
let connections = [];      // { id, fromCardId, toCardId, toCharName }
let nextConnId = 1;
let draggingConn = null;   // { fromCardId, startX, startY, currX, currY }

function findEcPort(cardId) {
  return [...document.querySelectorAll('[data-ec-port]')].find(p =>
    parseInt(p.dataset.cardId) === cardId
  );
}
function findSoPort(cardId, charName) {
  return [...document.querySelectorAll('[data-so-port]')].find(p =>
    parseInt(p.dataset.cardId) === cardId && p.dataset.charName === charName
  );
}
function portCenterLocal(portEl) {
  const inner = $('canvasInner').getBoundingClientRect();
  const r = portEl.getBoundingClientRect();
  return {
    x: (r.left + r.width / 2 - inner.left) / canvasScale,
    y: (r.top + r.height / 2 - inner.top) / canvasScale,
  };
}
function connPath(f, t) {
  const dx = t.x - f.x;
  const dy = t.y - f.y;
  // Use orthogonal-style routing with a single rounded elbow
  // Determine primary axis and place elbow
  let mx = f.x;
  if (Math.abs(dx) > Math.abs(dy)) {
    // More horizontal: go mostly horizontally first, then drop down/up
    mx = f.x + dx * 0.55;
  } else {
    // More vertical: go mostly vertically first, then across
    mx = f.x + dx * 0.85;
  }
  return `M${f.x.toFixed(1)},${f.y.toFixed(1)} Q${mx.toFixed(1)},${f.y.toFixed(1)} ${t.x.toFixed(1)},${t.y.toFixed(1)}`;
}
function redrawConnections() {
  const svg = $('connLayer');
  if (!svg) return;
  let html = '';
  // Clear active highlights first
  document.querySelectorAll('.so-port.conn-active').forEach(p => p.classList.remove('conn-active'));
  connections.forEach(c => {
    const fp = findEcPort(c.fromCardId);
    const tp = findSoPort(c.toCardId, c.toCharName);
    if (!fp || !tp) return;
    const f = portCenterLocal(fp);
    const t = portCenterLocal(tp);
    html += `<path d="${connPath(f, t)}" data-conn-id="${c.id}" />`;
    if (tp) tp.classList.add('conn-active');
  });
  if (draggingConn) {
    const dx = draggingConn.currX - draggingConn.startX;
    const dy = draggingConn.currY - draggingConn.startY;
    let mx = draggingConn.startX;
    if (Math.abs(dx) > Math.abs(dy)) {
      mx = draggingConn.startX + dx * 0.55;
    } else {
      mx = draggingConn.startX + dx * 0.85;
    }
    html += `<path class="conn-temp" d="M${draggingConn.startX.toFixed(1)},${draggingConn.startY.toFixed(1)} Q${mx.toFixed(1)},${draggingConn.startY.toFixed(1)} ${draggingConn.currX.toFixed(1)},${draggingConn.currY.toFixed(1)}" />`;
  }
  svg.innerHTML = html;
}
// Coalesce rapid redraw requests into a single rAF
let _redrawRAF = 0;
function requestRedraw() {
  if (_redrawRAF) return;
  _redrawRAF = requestAnimationFrame(() => { _redrawRAF = 0; redrawConnections(); });
}

function startConnDrag(e, sourceType, sourceRef) {
  e.preventDefault();
  e.stopPropagation();
  const portEl = e.currentTarget;
  const start = portCenterLocal(portEl);
  draggingConn = {
    sourceType, sourceRef,
    startX: start.x, startY: start.y,
    currX: start.x, currY: start.y,
    snapPort: null,  // currently snapped target port element
  };
  redrawConnections();
  const SNAP_RADIUS_PX = 34; // screen pixels — ports within this distance auto-snap
  const onMove = (ev) => {
    const inner = $('canvasInner').getBoundingClientRect();
    draggingConn.currX = (ev.clientX - inner.left) / canvasScale;
    draggingConn.currY = (ev.clientY - inner.top) / canvasScale;
    // Clear previous snap highlight
    document.querySelectorAll('.conn-target, .conn-snapped').forEach(p => { p.classList.remove('conn-target'); p.classList.remove('conn-snapped'); });
    // Find nearest valid target port (opposite type) within snap radius
    const targetSel = sourceType === 'equipment' ? '[data-so-port]' : '[data-ec-port]';
    const candidates = [...document.querySelectorAll(targetSel)];
    let best = null, bestDist = SNAP_RADIUS_PX;
    candidates.forEach(p => {
      const r = p.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const d = Math.hypot(ev.clientX - cx, ev.clientY - cy);
      if (d < bestDist) { bestDist = d; best = p; }
    });
    draggingConn.snapPort = best;
    if (best) {
      best.classList.add('conn-snapped');
      // Snap the temp line endpoint to the target port center for visual confirmation
      const snapped = portCenterLocal(best);
      draggingConn.currX = snapped.x;
      draggingConn.currY = snapped.y;
    }
    redrawConnections();
  };
  const onUp = (ev) => {
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup', onUp);
    document.querySelectorAll('.conn-target, .conn-snapped').forEach(p => { p.classList.remove('conn-target'); p.classList.remove('conn-snapped'); });
    const port = draggingConn && draggingConn.snapPort;
    if (port && draggingConn) {
      // Build connection in canonical form: fromCardId = equipment, toCardId+toCharName = lineup
      let fromCardId, toCardId, toCharName;
      if (sourceType === 'equipment') {
        fromCardId = draggingConn.sourceRef.cardId;
        toCardId = parseInt(port.dataset.cardId);
        toCharName = port.dataset.charName;
      } else {
        // Started from character port → dropped on equipment port
        toCardId = draggingConn.sourceRef.cardId;
        toCharName = draggingConn.sourceRef.charName;
        fromCardId = parseInt(port.dataset.cardId);
      }
      const dup = connections.some(c =>
        c.fromCardId === fromCardId && c.toCardId === toCardId && c.toCharName === toCharName
      );
      if (!dup) {
        connections.push({ id: nextConnId++, fromCardId, toCardId, toCharName });
        saveAll();
        setStatus('已连接装备组 ↔ 角色', true);
      } else {
        setStatus('该装备组与角色已连接');
      }
    }
    draggingConn = null;
    redrawConnections();
  };
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
}

// Remove connections that reference missing cards / characters
function cleanupConnections() {
  const before = connections.length;
  connections = connections.filter(c => {
    const ec = equipmentCards.find(e => e.id === c.fromCardId);
    const lc = lineupCards.find(l => l.id === c.toCardId);
    if (!ec || !lc) return false;
    if (!lc.lineup.includes(c.toCharName)) return false;  // character removed
    return true;
  });
  if (connections.length !== before) saveAll();
}

// Wire ec-port drag — called after each renderEquipmentCard
function bindEcPorts(root) {
  root.querySelectorAll('[data-ec-port]').forEach(p => {
    const cardId = parseInt(p.dataset.cardId);
    p.addEventListener('mousedown', function(e) { startConnDrag(e, 'equipment', { cardId }); });
  });
}
// Wire so-port drag (reverse direction: character → equipment) — called after each renderLineupCard
function bindSoPorts(root) {
  root.querySelectorAll('[data-so-port]').forEach(p => {
    const cardId = parseInt(p.dataset.cardId);
    const charName = p.dataset.charName;
    p.addEventListener('mousedown', function(e) { startConnDrag(e, 'character', { cardId, charName }); });
    p.addEventListener('dragstart', e => e.preventDefault());
  });
}

// Click on a connection line to delete it
$('connLayer').addEventListener('click', function(e) {
  if (e.target.tagName === 'path' && e.target.dataset.connId) {
    const id = parseInt(e.target.dataset.connId);
    connections = connections.filter(c => c.id !== id);
    // Clear active port highlights that may now be stale
    document.querySelectorAll('.so-port.conn-active').forEach(p => p.classList.remove('conn-active'));
    saveAll();
    redrawConnections();
    setStatus('已断开连接');
  }
});

// ===== Storage =====
const STORAGE_KEY = "dragon_lineup_v2";

function saveAll() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      lineupCards: lineupCards.map(c => ({
        id: c.id, type: 'lineup', x: c.x, y: c.y,
        title: c.title, dragonName: c.dragonName,
        lineup: c.lineup, longyu: c.longyu,
        skillOrder: c.skillOrder, skillOrderToggles: c.skillOrderToggles,
      })),
      equipmentCards: equipmentCards.map(c => ({
        id: c.id, type: 'equipment', x: c.x, y: c.y, title: c.title, slots: c.slots,
      })),
      dragonNestCards: dragonNestCards.map(c => ({
        id: c.id, type: 'dragonNest', x: c.x, y: c.y, title: c.title, slots: c.slots, artifacts: c.artifacts || [],
        pickerOpen: c.pickerOpen || false,
      })),
      connections: connections,
      nextConnId: nextConnId,
      nextCardId: nextCardId,
    }));
  } catch(e) {}
}

function loadAll() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

// Try migrate from v1
function migrateV1() {
  try {
    const raw = localStorage.getItem("dragon_lineup");
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (data.lineup && data.lineup.some(Boolean)) {
      const card = createLineupCard(60, 60, { title: '阵容 1' });
      card.lineup = data.lineup;
      // Enforce max 6 characters
      clampLineup(card.lineup, 6);
      if (data.skillOrder) card.skillOrder = data.skillOrder;
      if (data.skillOrderToggles) card.skillOrderToggles = data.skillOrderToggles;
      // Migrate longyu
      if (data.dragonLongyu && data.activeDragon) {
        card.dragonName = data.activeDragon;
        if (data.dragonLongyu[data.activeDragon]) {
          card.longyu = [...data.dragonLongyu[data.activeDragon]];
        }
      }
      updateSkillOrderForCard(card);
      renderLineupCard(card);
      // Clean up old key
      localStorage.removeItem("dragon_lineup");
      saveAll();
      return true;
    }
    return false;
  } catch(e) { return false; }
}

// ===== Status =====
let statusTimeout = null;
function setStatus(msg, isSuccess) {
  statusbar.textContent = msg;
  statusbar.className = 'statusbar' + (isSuccess ? ' success' : '');
  if (statusTimeout) clearTimeout(statusTimeout);
  statusTimeout = setTimeout(() => {
    statusbar.className = 'statusbar';
    statusbar.textContent = '拖拽角色到阵容空槽，或点击选中后点空槽上阵';
  }, 3000);
}

// ===== Layout =====
function isMobile() { return window.innerWidth <= 768; }
function adjustLayout() {
  const rp = $('poolView');
  const lb = $('leftBody');
  if (isMobile()) {
    if (rp.parentElement !== lb) lb.appendChild(rp);
  } else {
    const app = document.querySelector('.app');
    if (rp.parentElement !== app) app.appendChild(rp);
  }
}

// ===== Init =====
function init() {
  loadCustomImages();
  initFilters();
  initPool();
  initCanvas();

  // Load saved data
  const saved = loadAll();
  const hasLineup = saved && saved.lineupCards && saved.lineupCards.length > 0;
  const hasOther = saved && ((saved.equipmentCards && saved.equipmentCards.length) || (saved.dragonNestCards && saved.dragonNestCards.length));
  if (hasLineup || hasOther) {
    nextCardId = saved.nextCardId || 1;
    (saved.lineupCards || []).forEach(data => {
      const card = {
        id: data.id, x: data.x, y: data.y,
        title: data.title, dragonName: data.dragonName,
        lineup: data.lineup || new Array(9).fill(null),
        longyu: data.longyu || LONGYU_BY_SLOT.map(s => s[0]),
        skillOrder: data.skillOrder || [],
        skillOrderToggles: data.skillOrderToggles || {},
      };
      // Enforce max 6 characters
      clampLineup(card.lineup, 6);
      lineupCards.push(card);
      renderLineupCard(card);
    });
    (saved.equipmentCards || []).forEach(data => {
      const rawSlots = (data.slots && data.slots.length === 6) ? data.slots : new Array(6).fill(null);
      // Migrate: treat empty strings as null (old text-based slots)
      const slots = rawSlots.map(s => (s && s !== '') ? s : null);
      const card = {
        id: data.id, type: 'equipment', x: data.x, y: data.y,
        title: data.title, slots: slots,
      };
      equipmentCards.push(card);
      renderEquipmentCard(card);
    });
    (saved.dragonNestCards || []).forEach(data => {
      const card = {
        id: data.id, type: 'dragonNest', x: data.x, y: data.y,
        title: data.title, slots: (data.slots && data.slots.length === 64) ? data.slots : new Array(64).fill(null),
        artifacts: Array.isArray(data.artifacts) ? data.artifacts.filter(a => a && a.file) : [],
        pickerOpen: data.pickerOpen || false,
      };
      dragonNestCards.push(card);
      renderDragonNestCard(card);
    });
    // Load connections (migrate old per-slot model → group model)
    if (saved.connections) {
      connections = saved.connections
        .filter(c => c && c.fromCardId != null && c.toCardId != null && c.toCharName)
        // Dedupe: same (fromCardId, toCardId, toCharName) — old per-slot connections collapse to one group connection
        .filter((c, idx, arr) => arr.findIndex(x => x.fromCardId === c.fromCardId && x.toCardId === c.toCardId && x.toCharName === c.toCharName) === idx)
        .map(c => ({ id: c.id, fromCardId: c.fromCardId, toCardId: c.toCardId, toCharName: c.toCharName }));
      nextConnId = saved.nextConnId || (connections.reduce((m, c) => Math.max(m, c.id || 0), 0) + 1);
      cleanupConnections();
    }
    // If only other cards existed and no lineup, ensure nextCardId stays consistent
  } else {
    // Try v1 migration
    if (!migrateV1()) {
      // Create default card
      const card = createLineupCard(60, 60, { title: '阵容 1' });
    }
  }

  adjustLayout();
  updateCanvasTransform();
  // Center view on content
  setTimeout(() => { fitCanvasView(); redrawConnections(); }, 100);
}

window.addEventListener('resize', () => { adjustLayout(); fitCanvasView(); requestRedraw(); });

$('saveBtn').addEventListener('click', function() { saveAll(); setStatus('已保存', true); });
$('resetBtn').addEventListener('click', function() {
  if (!confirm('确定重置所有阵容吗？')) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem("dragon_lineup");
  [...lineupCards, ...equipmentCards, ...dragonNestCards].forEach(c => {
    const prefix = c.type === 'equipment' ? 'ec-' : c.type === 'dragonNest' ? 'dn-' : 'lc-';
    const el = document.getElementById(prefix + c.id);
    if (el) el.remove();
  });
  lineupCards = [];
  equipmentCards = [];
  dragonNestCards = [];
  connections = [];
  nextConnId = 1;
  nextCardId = 1;
  selectedChar = null;
  document.querySelectorAll('.char-card').forEach(el => el.classList.remove('selected'));
  const card = createLineupCard(60, 60, { title: '阵容 1' });
  applyPoolFilter();
  setTimeout(fitCanvasView, 50);
  setStatus('已重置');
});

$('tutorialBtn').addEventListener('click', openTutorial);

init();
